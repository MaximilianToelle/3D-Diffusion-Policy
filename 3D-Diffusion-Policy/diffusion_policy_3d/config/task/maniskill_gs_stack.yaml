defaults:
  - maniskill_base   
  - _self_           


name: maniskill_gs_stack
num_gaussians: 1024

shape_meta: &shape_meta
  obs:
    gs_positions:
      shape: 
        - ${task.num_gaussians}
        - 3
      type: spatial
    point_cloud:  # for running dp3 on gsplat means
      shape: 
        - ${task.num_gaussians}
        - 3
      type: spatial
    gs_rotations_9d:
      shape: 
        - ${task.num_gaussians}
        - 9
      type: spatial
    gs_surface_normals:   # trying to use surface normals instead of rotation matrices
      shape: 
        - ${task.num_gaussians}
        - 3
      type: spatial
    gs_log_scales:
      shape: 
        - ${task.num_gaussians}
        - 3
      type: spatial
    gs_opacities:
      shape: 
        - ${task.num_gaussians}
        - 1
      type: spatial
    gs_rgb:
      shape: 
        - ${task.num_gaussians}
        - 3
      type: spatial 

env_runner:
  _target_: diffusion_policy_3d.env_runner.maniskill_gs_runner.GSManiSkillRunner
  task_name: StackFr3Env-v1
  num_gaussians: ${task.num_gaussians}
  use_gsplat_viewer: false

dataset:
  _target_: diffusion_policy_3d.dataset.maniskill_gs_dataset.GSManiskillDataset
  zarr_path: /home/max/projects/gsplat_policy/datasets/gsplat_3d_diffusion_policy/stack
  num_gaussians: ${task.num_gaussians}
